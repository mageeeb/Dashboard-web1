
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOC 1 — Authentification & Regex</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
/* (Garde ton CSS tel quel, rien à changer) */
</style>
</head>

<body>

<div id="authBox" class="auth-box">
    <h1>jQuery Academy</h1>
    <p class="sub">Crée ton compte pour accéder au dashboard.</p>

    <div class="tabs">
        <button class="tab active" data-form="signupForm">Inscription</button>
        <button class="tab" data-form="loginForm">Connexion</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm">
        <div class="field" id="f-username">
            <label>Nom d'utilisateur</label>
            <input type="text" id="signup-username">
            <div class="hint">3-16 caractères</div>
        </div>

        <div class="field" id="f-email">
            <label>Email</label>
            <input type="email" id="signup-email">
            <div class="hint">Format email</div>
        </div>

        <div class="field" id="f-password">
            <label>Mot de passe</label>
            <input type="password" id="signup-password">
            <div class="hint">8+ caractères</div>
            <div class="strength">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>

        <button id="signupBtn" class="submit-btn">Créer</button>
        <div id="signupFlash" class="flash"></div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" style="display:none">
        <input id="login-email" placeholder="email">
        <input id="login-password" type="password" placeholder="password">
        <button id="loginBtn">Login</button>
        <div id="loginFlash" class="flash"></div>
    </div>
</div>

<div id="welcome" style="display:none">
    <h2>Bienvenue</h2>
    <p id="welcomeMsg"></p>
    <button id="logoutBtn">Logout</button>
</div>

<script>
let registeredUser = null;

/* ================= REGEX ================= */
const REGEX = {
    username: /^[a-zA-Z0-9_-]{3,16}$/,
    email: /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/,
    password: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=]).{8,}$/
};

/* ================= TABS ================= */
$(".tab").click(function(){
    $(".tab").removeClass("active");
    $(this).addClass("active");

    const form = $(this).data("form");
    $("#signupForm, #loginForm").hide();
    $("#" + form).fadeIn();
});

/* ================= USERNAME ================= */
$("#signup-username").keyup(function(){
    $("#f-username").removeClass("ok error");
    const val = $(this).val();

    if(REGEX.username.test(val)){
        $("#f-username").addClass("ok").find(".hint").text("OK");
    } else {
        $("#f-username").addClass("error").find(".hint").text("Invalide");
    }
});

/* ================= EMAIL ================= */
$("#signup-email").keyup(function(){
    $("#f-email").removeClass("ok error");
    const val = $(this).val();

    if(REGEX.email.test(val)){
        $("#f-email").addClass("ok").find(".hint").text("Email valide");
    } else {
        $("#f-email").addClass("error").find(".hint").text("Email invalide");
    }
});

/* ================= PASSWORD ================= */
$("#signup-password").keyup(function(){
    const password = $(this).val();
    let score = 0;

    if(password.length >= 8) score++;
    if(/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
    if(/\d/.test(password)) score++;
    if(/[!@#$%^&*()_\-+=]/.test(password)) score++;

    $(".strength span").each(function(i){
        $(this).removeClass("faible moyen fort");

        if(i < score){
            if(score <=1) $(this).addClass("faible");
            else if(score <=3) $(this).addClass("moyen");
            else $(this).addClass("fort");
        }
    });

    $("#f-password").removeClass("ok error");

    if(REGEX.password.test(password)){
        $("#f-password").addClass("ok").find(".hint").text("OK");
    } else {
        $("#f-password").addClass("error").find(".hint").text("Faible");
    }
});

/* ================= SIGNUP ================= */
$("#signupBtn").click(function(){
    const username = $("#signup-username").val().trim();
    const email = $("#signup-email").val().trim();
    const password = $("#signup-password").val();

    let errors = [];

    if(!REGEX.username.test(username)) errors.push("username");
    if(!REGEX.email.test(email)) errors.push("email");
    if(!REGEX.password.test(password)) errors.push("password");

    if(errors.length){
        $("#signupFlash").addClass("err").html(errors.join("<br>")).show();
        return;
    }

    registeredUser = {username, email, password};
    doLogin();
});

/* ================= LOGIN ================= */
$("#loginBtn").click(function(){
    const email = $("#login-email").val();
    const password = $("#login-password").val();

    if(!registeredUser){
        $("#loginFlash").text("Inscris-toi d'abord").show();
        return;
    }

    if(email !== registeredUser.email || password !== registeredUser.password){
        $("#loginFlash").text("Erreur login").show();
        return;
    }

    doLogin();
});

/* ================= LOGIN SYSTEM ================= */
function doLogin(){
    $("#authBox").hide();
    $("#welcome").show();
    $("#welcomeMsg").html("Bienvenue " + registeredUser.username);
}

$("#logoutBtn").click(function(){
    $("#welcome").hide();
    $("#authBox").show();
});
</script>

</body>
</html>
